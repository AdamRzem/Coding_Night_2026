<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>%sveltekit.status% | %sveltekit.error.message%</title>
		<style>
			:root {
				color-scheme: light dark;
				--bg: #0f172a;
				--surface: rgba(15, 23, 42, 0.78);
				--text: #e2e8f0;
				--muted: #94a3b8;
				--border: rgba(148, 163, 184, 0.28);
				--accent: #22c55e;
			}

			@media (prefers-color-scheme: light) {
				:root {
					--bg: #f8fafc;
					--surface: #ffffff;
					--text: #0f172a;
					--muted: #475569;
					--border: #e2e8f0;
					--accent: #16a34a;
				}
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 1.25rem;
				font-family: 'Segoe UI', system-ui, sans-serif;
				background:
					radial-gradient(circle at 15% 15%, rgba(34, 197, 94, 0.16), transparent 35%),
					radial-gradient(circle at 85% 10%, rgba(56, 189, 248, 0.14), transparent 38%), var(--bg);
				color: var(--text);
			}

			main {
				max-width: 40rem;
				width: 100%;
				padding: 2rem;
				border: 1px solid var(--border);
				border-radius: 1rem;
				background: var(--surface);
				backdrop-filter: blur(8px);
				box-shadow:
					0 20px 40px rgba(2, 6, 23, 0.25),
					inset 0 1px 0 rgba(255, 255, 255, 0.1);
			}

			.status {
				display: inline-block;
				padding: 0.35rem 0.75rem;
				border-radius: 999px;
				font-size: 0.85rem;
				font-weight: 700;
				letter-spacing: 0.02em;
				background: color-mix(in oklab, var(--accent) 15%, transparent);
				color: var(--accent);
			}

			h1 {
				margin: 0.9rem 0 0.6rem;
				font-size: clamp(1.4rem, 1rem + 1.5vw, 2rem);
				line-height: 1.2;
			}

			p {
				margin: 0;
				line-height: 1.55;
				color: var(--muted);
			}

			.actions {
				margin-top: 1.4rem;
				display: flex;
				gap: 0.7rem;
				flex-wrap: wrap;
			}

			a,
			button {
				border: 1px solid var(--border);
				background: transparent;
				color: var(--text);
				padding: 0.6rem 0.95rem;
				border-radius: 0.6rem;
				font: inherit;
				text-decoration: none;
				cursor: pointer;
				transition:
					border-color 0.16s ease,
					transform 0.16s ease;
			}

			a:hover,
			button:hover {
				border-color: var(--accent);
				transform: translateY(-1px);
			}
		</style>
	</head>
	<body>
		<main>
			<span class="status">Error %sveltekit.status%</span>
			<h1>Something went wrong</h1>
			<p>%sveltekit.error.message%</p>
			<div class="actions">
				<a href="/">Go to home</a>
				<a href="/login">Go to login</a>
				<button type="button" onclick="location.reload()">Try again</button>
			</div>
		</main>
	</body>
</html>
